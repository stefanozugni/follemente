<div class="quiz-container">
    <div class="quiz-card">

        <ng-container *ngIf="!isQuizFinished && currentQuestion">

            <div class="quiz-header">
                <div class="progress-meta">
                    <span>Profilo emotivo</span>
                    <span>Domanda {{ currentQuestionIndex + 1 }} di {{ questions.length }}</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" [style.width.%]="(currentQuestionIndex + 1) / questions.length * 100">
                    </div>
                </div>
            </div>

            <div class="quiz-main-content">
                <div class="question-body">
                    <p class="theme-label">{{ currentQuestion.theme }}</p>
                    <h2 class="scenario-title">{{ currentQuestion.scenario }}</h2>
                    <h3 class="question-prompt">{{ currentQuestion.question }}</h3>
                </div>

                <div class="answers-container">
                    <button type="button" *ngFor="let answer of currentQuestion.answers" class="answer-button"
                        [class.selected]="answer.id === selectedAnswerId"
                        [attr.aria-pressed]="answer.id === selectedAnswerId"
                        (click)="selectAnswer(answer)">
                        <span class="answer-letter" aria-hidden="true">{{ answer.id }}</span>
                        <span>{{ answer.text }}</span>
                    </button>
                </div>
            </div>

            <div class="quiz-footer">
                <button type="button" class="submit-button" [disabled]="!selectedAnswerId" (click)="submitAnswer()">
                    Avanti <span aria-hidden="true">→</span>
                </button>
            </div>

        </ng-container>

        <div *ngIf="isQuizFinished" class="quiz-finished-container">
            <h2>Analisi Completata!</h2>
            <p>Stiamo calcolando il tuo profilo archetipico.</p>
            <button class="submit-button" [routerLink]="['/results']">SCOPRI IL TUO CAST</button>
        </div>

    </div>
</div>
